<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terapia do Esquema — Guia Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #ede8de;
    --border: #d8d0c2;
    --text: #2a2620;
    --muted: #8a7f72;
    --accent: #c8a96e;
    --pos: #4a9e6b;
    --neg: #b85a4a;
    --pos-bg: #eef7f2;
    --neg-bg: #fdf0ee;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  header {
    padding: 5rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,169,110,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-label {
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.2rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 5vw, 4.2rem);
    font-weight: 400;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 1rem;
  }
  h1 em { font-style: italic; color: var(--accent); }
  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    max-width: 520px;
    margin: 0 auto 2.5rem;
  }

  .page-tabs {
    display: flex;
    justify-content: center;
    margin-bottom: 0;
  }
  .page-tab {
    padding: 0.65rem 2rem;
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    transition: all 0.2s;
  }
  .page-tab:first-child { border-radius: 2rem 0 0 2rem; }
  .page-tab:last-child { border-radius: 0 2rem 2rem 0; border-left: none; }
  .page-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .domain-nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
    padding: 2rem 1rem 2.5rem;
  }
  .dom-btn {
    padding: 0.5rem 1.1rem;
    border-radius: 2rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.25s;
    font-family: 'DM Sans', sans-serif;
  }
  .dom-btn:hover, .dom-btn.active {
    border-color: var(--dom-color, var(--accent));
    color: var(--dom-color, var(--accent));
    background: color-mix(in srgb, var(--dom-color, var(--accent)) 10%, var(--surface));
  }

  main { max-width: 960px; margin: 0 auto; padding: 0 1.5rem 6rem; }

  .domain { margin-bottom: 4rem; }
  .domain-header {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .domain-number {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 700;
    opacity: 0.22;
    line-height: 1;
    min-width: 2rem;
  }
  .domain-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.25rem;
  }
  .domain-info p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
  .domain-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 0.2rem; flex-shrink: 0; }

  .schemas-grid, .pc-grid {
    display: grid;
    gap: 1px;
    background: var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .schema-card, .pc-card {
    background: var(--surface);
    padding: 1.5rem 1.8rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .schema-card:hover, .pc-card:hover { background: var(--surface2); }
  .schema-card.open, .pc-card.open { background: var(--surface2); }

  .schema-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }
  .schema-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.3rem;
  }
  .schema-tagline { font-size: 0.78rem; color: var(--muted); }
  .schema-toggle {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    font-size: 0.75rem;
    flex-shrink: 0;
    margin-top: 0.2rem;
    transition: all 0.2s;
  }
  .schema-card.open .schema-toggle,
  .pc-card.open .schema-toggle {
    border-color: var(--dom-color);
    color: var(--dom-color);
    transform: rotate(45deg);
  }

  .schema-body, .pc-body {
    display: none;
    padding-top: 1.2rem;
    border-top: 1px solid var(--border);
    margin-top: 1rem;
  }
  .schema-card.open .schema-body,
  .pc-card.open .pc-body { display: block; }

  .body-section { margin-bottom: 1rem; }
  .body-label {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dom-color, var(--accent));
    margin-bottom: 0.5rem;
    opacity: 0.8;
  }
  .body-text { font-size: 0.85rem; color: #5a5248; line-height: 1.65; }
  .patterns-list { list-style: none; display: flex; flex-direction: column; gap: 0.35rem; }
  .patterns-list li { font-size: 0.83rem; color: #5a5248; padding-left: 1rem; position: relative; }
  .patterns-list li::before { content: '–'; position: absolute; left: 0; color: var(--dom-color, var(--accent)); opacity: 0.6; }

  /* PROS CONS */
  .pc-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 580px) { .pc-cols { grid-template-columns: 1fr; } }

  .pc-col { border-radius: 10px; padding: 1.1rem 1.2rem; }
  .pc-col.pos { background: var(--pos-bg); }
  .pc-col.neg { background: var(--neg-bg); }

  .pc-col-title {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .pc-col.pos .pc-col-title { color: var(--pos); }
  .pc-col.neg .pc-col-title { color: var(--neg); }

  .pc-col-title span {
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .pc-col.pos .pc-col-title span { background: var(--pos); color: #fff; }
  .pc-col.neg .pc-col-title span { background: var(--neg); color: #fff; }

  .pc-list { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
  .pc-list li { font-size: 0.82rem; line-height: 1.55; padding-left: 0.9rem; position: relative; }
  .pc-col.pos .pc-list li { color: #2a5c3e; }
  .pc-col.neg .pc-list li { color: #6b2e25; }
  .pc-col.pos .pc-list li::before { content: '+'; position: absolute; left: 0; color: var(--pos); font-weight: 500; }
  .pc-col.neg .pc-list li::before { content: '–'; position: absolute; left: 0; color: var(--neg); font-weight: 500; }

  .pc-note {
    margin-top: 1rem;
    padding: 0.85rem 1rem;
    background: color-mix(in srgb, var(--dom-color, var(--accent)) 8%, var(--surface));
    border-left: 3px solid var(--dom-color, var(--accent));
    border-radius: 0 8px 8px 0;
    font-size: 0.8rem;
    color: #5a5248;
    line-height: 1.6;
  }
  .pc-note strong {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dom-color, var(--accent));
    margin-bottom: 0.3rem;
    font-weight: 500;
  }

  footer { text-align: center; padding: 2rem; font-size: 0.75rem; color: var(--muted); border-top: 1px solid var(--border); }

  @media (max-width: 600px) {
    .domain-number { font-size: 2rem; }
    h1 { font-size: 2rem; }
    .page-tab { padding: 0.55rem 1.2rem; font-size: 0.75rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Terapia do <em>Esquema</em></h1>
  <p class="subtitle">Os 18 esquemas desadaptativos precoces: padrões, origens, e os dois lados de cada esquema.</p>
  <div class="page-tabs">
    <button class="page-tab active" onclick="switchPage('patterns', this)">Padrões e Origens</button>
    <button class="page-tab" onclick="switchPage('procons', this)">Pontos Positivos e Negativos</button>
  </div>
</header>

<div class="domain-nav">
  <button class="dom-btn active" style="--dom-color:#c8a96e" onclick="filterDomain(0, this)">Todos</button>
  <button class="dom-btn" style="--dom-color:#c46b5a" onclick="filterDomain(1, this)">I · Desconexão</button>
  <button class="dom-btn" style="--dom-color:#c4935a" onclick="filterDomain(2, this)">II · Autonomia</button>
  <button class="dom-btn" style="--dom-color:#b8b04a" onclick="filterDomain(3, this)">III · Limites</button>
  <button class="dom-btn" style="--dom-color:#5aab7e" onclick="filterDomain(4, this)">IV · Orientação</button>
  <button class="dom-btn" style="--dom-color:#5a85c4" onclick="filterDomain(5, this)">V · Supervigilância</button>
</div>

<main id="mainContent"></main>

<footer>Baseado na Terapia do Esquema de Jeffrey Young · Para uso psicoeducacional</footer>

<script>
const domains = [
  {
    id:1, color:'#c46b5a',
    title:'Desconexão e Rejeição',
    desc:'Incapacidade de formar vínculos seguros e satisfatórios. Origem em famílias frias, rejeitadoras, abusivas ou imprevisíveis.',
    schemas:[
      { name:'Abandono / Instabilidade', tagline:'Percepção de que as pessoas significativas irão embora',
        origin:'Frequentemente associado a perdas precoces, separação dos pais ou cuidadores emocionalmente instáveis.',
        patterns:['Apego ansioso e comportamentos de "agarramento" nos relacionamentos','Ciúme excessivo e verificações constantes do parceiro','Terminar relacionamentos antes de ser abandonado(a)','Tolerância a relacionamentos abusivos por medo de ficar sozinho(a)','Reações emocionais intensas a separações breves','Dificuldade em confiar na permanência do outro'],
        pros:['Alta capacidade de empatia e sensibilidade emocional','Comprometimento profundo e lealdade nos relacionamentos','Habilidade de perceber mudanças sutis no outro','Valorização intensa dos vínculos afetivos','Motivação para nutrir e manter relacionamentos'],
        cons:['Dependência emocional que sufoca o outro','Dificuldade de tolerar solidão saudável','Ciúme e comportamentos controladores','Oscilações emocionais intensas ligadas ao outro','Autossabotagem de relacionamentos estáveis','Submissão a situações abusivas por medo da perda'],
        note:'O medo do abandono, quando integrado, pode se tornar uma profunda capacidade de investimento afetivo — desde que equilibrado com autonomia emocional.'
      },
      { name:'Desconfiança / Abuso', tagline:'Expectativa de que os outros irão magoar, manipular ou enganar',
        origin:'Geralmente ligado a abuso físico, emocional ou sexual na infância, ou traições significativas.',
        patterns:['Hipervigílância a sinais de desonestidade ou má-fé','Dificuldade de se abrir e confiar mesmo em pessoas próximas','Interpretar atos neutros como ameaças ou manipulações','Tendência a testar os outros para "provar" que irão trair','Isolamento social como forma de proteção','Raiva intensa quando se sente enganado(a)'],
        pros:['Capacidade apurada de detectar inconsistências e mentiras','Habilidade de proteger a si mesmo(a) em ambientes hostis','Pensamento crítico e analítico aguçado','Independência e autossuficiência desenvolvidas','Cautela que evita manipulações reais'],
        cons:['Isolamento afetivo e dificuldade de intimidade','Relacionamentos superficiais e instáveis','Desgaste emocional por constante estado de alerta','Profecias autorrealizáveis: testa até romper vínculos','Hostilidade que afasta pessoas genuínas'],
        note:'A vigilância aguçada pode ser uma força em contextos onde discernimento é necessário. O desafio é não generalizar o perigo para situações seguras.'
      },
      { name:'Privação Emocional', tagline:'Crença de que suas necessidades emocionais jamais serão atendidas',
        origin:'Cuidadores emocionalmente distantes, frios ou negligentes.',
        patterns:['Dificuldade de pedir ajuda ou apoio emocional','Sensação crônica de vazio e solidão, mesmo em relacionamentos','Escolher parceiros emocionalmente indisponíveis','Minimizar as próprias necessidades afetivas','Ressentimento silencioso quando não recebe atenção espontânea','Autossuficiência excessiva como defesa'],
        pros:['Grande autossuficiência e independência emocional','Capacidade de funcionar bem mesmo sem suporte externo','Profunda empatia pelas necessidades emocionais alheias','Não cria dependência excessiva nos outros','Habilidade de cuidar de si mesmo(a) em situações difíceis'],
        cons:['Relacionamentos afetivamente vazios e superficiais','Dificuldade de receber afeto sem desconforto','Negligência das próprias necessidades emocionais','Ressentimento acumulado sem expressão','Sensação crônica de vazio difícil de nomear'],
        note:'Aprender a identificar e comunicar necessidades afetivas é o caminho terapêutico central — sem perder a autonomia conquistada.'
      },
      { name:'Defectividade / Vergonha', tagline:'Sensação de ser fundamentalmente falho(a), indigno(a) de amor',
        origin:'Críticas severas, humilhações ou rejeição pelos cuidadores.',
        patterns:['Vergonha intensa e medo de ser "descoberto(a)"','Evitação de intimidade por temer que o outro veja seus defeitos','Sensibilidade extrema a críticas, mesmo construtivas','Hipercriticismo em relação a si mesmo(a)','Relações superficiais para não expor vulnerabilidades','Perfeccionismo como tentativa de compensar a "falta"'],
        pros:['Motivação para aprimoramento e crescimento pessoal','Alta empatia pela dor e inadequação alheia','Humildade genuína e abertura para feedback','Atenção cuidadosa a detalhes e qualidade do próprio trabalho','Sensibilidade artística e introspectiva desenvolvida'],
        cons:['Evitação de intimidade e conexão real','Autocrítica paralisante que impede ação','Dificuldade de internalizar amor e aprovação recebidos','Vergonha tóxica que contamina a identidade inteira','Perfeccionismo compensatório e desgastante'],
        note:'O impulso de ser melhor pode ser canalizado de forma saudável quando desvinculado da vergonha — transformando autocrítica em crescimento compassivo.'
      },
      { name:'Isolamento Social / Alienação', tagline:'Sentimento de ser diferente, não pertencer a nenhum grupo',
        origin:'Família isolada socialmente, bullying, diferenças culturais marcantes.',
        patterns:['Evitação de situações sociais por ansiedade de não "se encaixar"','Sensação persistente de ser um(a) estranho(a) mesmo entre amigos','Dificuldade de compartilhar interesses ou humor com os outros','Comparação constante e desfavorável com grupos sociais','Isolamento voluntário como forma de evitar a rejeição','Dificuldade em se identificar com qualquer comunidade'],
        pros:['Pensamento original e criativo por estar fora do grupo','Capacidade de observação social apurada','Independência de opinião e autenticidade','Habilidade de se conectar com pessoas também "diferentes"','Conforto com a própria companhia e introspecção'],
        cons:['Solidão crônica e falta de pertencimento','Evitação de grupos que poderia integrar','Dificuldade de construir redes de suporte social','Profecia autorrealizável: evita e confirma o isolamento','Privação de experiências de conexão significativa'],
        note:'A perspectiva de "fora do grupo" pode ser uma vantagem criativa e intelectual real — o desafio é encontrar as comunidades onde pertencimento é possível.'
      },
    ]
  },
  {
    id:2, color:'#c4935a',
    title:'Autonomia e Desempenho Prejudicados',
    desc:'Dificuldade de funcionar de forma independente. Origem em famílias superprotetoras ou controladoras.',
    schemas:[
      { name:'Dependência / Incompetência', tagline:'Crença de não conseguir lidar com responsabilidades sem ajuda',
        origin:'Pais superprotetores que realizavam tarefas pela criança.',
        patterns:['Busca constante de reasseguramento em decisões cotidianas','Paralisia diante de tarefas que parecem "grandes demais"','Delegação excessiva de responsabilidades a outros','Relacionamentos onde o outro assume o papel parental','Ansiedade intensa quando forçado(a) a agir sozinho(a)','Evitação de novos desafios por medo de fracassar'],
        pros:['Habilidade de colaborar e trabalhar em equipe','Humildade para pedir ajuda e reconhecer limites','Valorização das contribuições alheias','Capacidade de criar vínculos de interdependência','Abertura para aprender com outros mais experientes'],
        cons:['Dificuldade de tomar decisões sozinho(a)','Ansiedade paralisante diante de desafios novos','Relacionamentos com dinâmica de dependência','Subdesenvolvimento de competências por evitação','Vulnerabilidade a relações de poder desequilibradas'],
        note:'Aprender a agir com incerteza — mesmo sem garantia de sucesso — é o caminho para integrar a capacidade de colaboração com autonomia real.'
      },
      { name:'Vulnerabilidade ao Dano ou à Doença', tagline:'Medo exagerado de catástrofes iminentes',
        origin:'Cuidadores ansiosos; experiências traumáticas precoces.',
        patterns:['Preocupação excessiva com saúde, acidentes ou crimes','Verificações repetidas de segurança','Evitação de viagens e situações novas','Catastrofização de sintomas físicos menores','Dificuldade de relaxar por antecipação de desastres','Comportamentos de reasseguramento frequentes'],
        pros:['Alta atenção à segurança própria e dos outros','Planejamento cuidadoso e antecipação de riscos reais','Motivação para cuidar da saúde preventivamente','Habilidade de identificar perigos genuínos','Responsabilidade com protocolos de segurança'],
        cons:['Restrição progressiva da vida por evitação','Desgaste físico e mental pelo estado de alerta constante','Transmissão de ansiedade para filhos ou parceiros','Dificuldade de aproveitar experiências novas','Dependência de reasseguramento que nunca satisfaz'],
        note:'A consciência de risco, calibrada à realidade, é uma qualidade valiosa. O trabalho terapêutico ajuda a distinguir perigo real de ameaça imaginada.'
      },
      { name:'Emaranhamento / Self Subdesenvolvido', tagline:'Fusão excessiva com figuras de apego; identidade pouco definida',
        origin:'Pais que não incentivavam a individuação; fronteiras difusas.',
        patterns:['Dificuldade em distinguir opiniões próprias das do outro','Culpa intensa ao tentar se diferenciar ou discordar','Vida organizada em torno das necessidades de uma figura central','Dificuldade de tomar decisões sem consultar a pessoa de apego','Sensação de vazio ao se afastar da figura de fusão','Fraca consciência de metas e valores pessoais'],
        pros:['Profunda capacidade de sintonia emocional com o outro','Habilidade de se adaptar às necessidades alheias','Comprometimento relacional intenso e duradouro','Sensibilidade às emoções e estados internos do outro','Capacidade de cuidado e suporte emocional profundo'],
        cons:['Perda da identidade própria nos relacionamentos','Incapacidade de funcionar bem quando separado(a)','Dificuldade de estabelecer limites saudáveis','Decisões baseadas nas expectativas alheias','Conflito interno entre o que sente e o que "deveria" sentir'],
        note:'A sintonia com o outro é uma dádiva relacional — o desafio é construir um self firme a partir do qual essa conexão seja livre, não fusional.'
      },
      { name:'Fracasso', tagline:'Crença de ser incapaz de alcançar desempenho equivalente ao dos outros',
        origin:'Críticas parentais ao desempenho, comparações negativas.',
        patterns:['Autossabotagem antes de situações avaliativas','Desistência prematura de projetos','Comparação constante com o sucesso alheio','Dificuldade de internalizar elogios ou conquistas','Procrastinação crônica como evitação do fracasso','Escolhas de carreira aquém do potencial por insegurança'],
        pros:['Humildade genuína e abertura para aprender','Empatia com quem enfrenta dificuldades e erros','Motivação para esforço e preparação cuidadosa','Sensibilidade para reconhecer o esforço dos outros','Ausência de arrogância ou complacência'],
        cons:['Autossabotagem sistemática de oportunidades','Procrastinação paralisante por medo de tentar','Subdesempenho crônico abaixo do potencial real','Dificuldade de internalizar sucessos genuínos','Comparação depreciativa e desgastante com os outros'],

      },
    ]
  },
  {
    id:3, color:'#b8b04a',
    title:'Limites Prejudicados',
    desc:'Falta de limites internos, dificuldade com responsabilidade e cooperação. Origem em famílias permissivas.',

        pros:['Alta confiança em si mesmo(a) e nas próprias capacidades','Ambição e disposição para assumir posições de liderança','Resiliência diante de críticas e rejeições','Capacidade de negociar e defender interesses com firmeza','Presença marcante que inspira confiança nos outros'],

        note:'A confiança e a ambição, quando acompanhadas de empatia genuína, tornam-se liderança real. Sem ela, tornam-se obstáculo relacional e profissional.'

let currentPage = 'patterns';
let currentFilter = 0;

function switchPage(page, btn) {
  currentPage = page;
  document.querySelectorAll('.page-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function filterDomain(id, btn) {
  currentFilter = id;
  document.querySelectorAll('.dom-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.domain').forEach(d => {
    d.style.display = (id === 0 || parseInt(d.dataset.domainId) === id) ? '' : 'none';
  });
}

function toggleCard(el) { el.classList.toggle('open'); }

function renderAll() {
  const main = document.getElementById('mainContent');
  main.innerHTML = domains.map(d => currentPage === 'patterns' ? buildPatterns(d) : buildProsCons(d)).join('');
  document.querySelectorAll('.domain').forEach(d => {
    d.style.display = (currentFilter === 0 || parseInt(d.dataset.domainId) === currentFilter) ? '' : 'none';
  });
}

function domainWrap(d, inner) {
  return `<div class="domain" data-domain-id="${d.id}">
    <div class="domain-header">
      <div class="domain-number" style="color:${d.color}">${d.id}</div>
      <div class="domain-dot" style="background:${d.color}"></div>
      <div class="domain-info"><h2>${d.title}</h2><p>${d.desc}</p></div>
    </div>${inner}</div>`;
}

function buildPatterns(d) {
  const cards = d.schemas.map(s => `
    <div class="schema-card" style="--dom-color:${d.color}" onclick="toggleCard(this)">
      <div class="schema-top">
        <div><div class="schema-name">${s.name}</div><div class="schema-tagline">${s.tagline}</div></div>
        <div class="schema-toggle">+</div>
      </div>
      <div class="schema-body">
        <div class="body-section">
          <div class="body-label">Origem comum</div>
          <div class="body-text">${s.origin}</div>
        </div>
        <div class="body-section">
          <div class="body-label">Padrões e atitudes típicas</div>
          <ul class="patterns-list">${s.patterns.map(p=>`<li>${p}</li>`).join('')}</ul>
        </div>
      </div>
    </div>`).join('');
  return domainWrap(d, `<div class="schemas-grid">${cards}</div>`);
}

function buildProsCons(d) {
  const cards = d.schemas.map(s => `
    <div class="pc-card" style="--dom-color:${d.color}" onclick="toggleCard(this)">
      <div class="schema-top">
        <div><div class="schema-name">${s.name}</div><div class="schema-tagline">${s.tagline}</div></div>
        <div class="schema-toggle">+</div>
      </div>
      <div class="pc-body">
        <div class="pc-cols">
          <div class="pc-col pos">
            <div class="pc-col-title"><span>+</span> Pontos Positivos</div>
            <ul class="pc-list">${s.pros.map(p=>`<li>${p}</li>`).join('')}</ul>
          </div>
          <div class="pc-col neg">
            <div class="pc-col-title"><span>–</span> Pontos Negativos</div>
            <ul class="pc-list">${s.cons.map(c=>`<li>${c}</li>`).join('')}</ul>
          </div>
        </div>
        <div class="pc-note"><strong>Perspectiva terapêutica</strong>${s.note}</div>
      </div>
    </div>`).join('');
  return domainWrap(d, `<div class="pc-grid">${cards}</div>`);
}

renderAll();
</script>
